name: Publish

on:
  release:
    types: [published]

jobs:
  publish-sdk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build SDK
        run: pnpm build

      - name: Publish SDK to npm
        run: |
          npm config set registry https://registry.npmjs.org/
          npm publish --access public --provenance
        working-directory: packages/js-sdk

  publish-create-app:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build create-app
        run: pnpm --filter create-reactor-app build

      - name: Publish create-app to npm
        run: |
          npm config set registry https://registry.npmjs.org/
          npm publish --access public --provenance
        working-directory: packages/create-app
