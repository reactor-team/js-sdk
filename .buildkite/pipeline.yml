steps:
  - group: ":hammer: Build & Lint"
    steps:
      - label: ":package: Build"
        key: build
        commands:
          - corepack enable
          - pnpm install --frozen-lockfile
          - pnpm build
          - pnpm --filter create-reactor-app build
        plugins:
          - docker#v5.12.0:
              image: "node:20"

      - label: ":prettier: Format Check"
        commands:
          - corepack enable
          - pnpm install --frozen-lockfile
          - pnpm format:check
        plugins:
          - docker#v5.12.0:
              image: "node:20"

  - group: ":test_tube: Tests"
    steps:
      - label: ":white_check_mark: Unit Tests"
        key: unit-tests
        commands:
          - corepack enable
          - pnpm install --frozen-lockfile
          - pnpm test:unit
        plugins:
          - docker#v5.12.0:
              image: "node:20"

      - label: ":globe_with_meridians: Integration Tests"
        key: integration-tests
        commands:
          - corepack enable
          - pnpm install --frozen-lockfile
          - pnpm test:integration
        plugins:
          - docker#v5.12.0:
              image: "node:20"
        env:
          REACTOR_API_KEY: "${REACTOR_API_KEY}"

  - wait

  - group: ":rocket: Publish"
    if: build.tag =~ /^v/
    steps:
      - label: ":npm: Publish @reactor-team/js-sdk"
        key: publish-sdk
        depends_on:
          - build
          - unit-tests
          - integration-tests
        commands:
          - corepack enable
          - pnpm install --frozen-lockfile
          - pnpm build
          - echo "//registry.npmjs.org/:_authToken=$${NPM_TOKEN}" > ~/.npmrc
          - cd packages/js-sdk && npm publish --access public
        plugins:
          - docker#v5.12.0:
              image: "node:24"
        env:
          NPM_TOKEN: "${NPM_TOKEN}"

      - label: ":npm: Publish create-reactor-app"
        key: publish-create-app
        depends_on:
          - build
          - unit-tests
          - integration-tests
        commands:
          - corepack enable
          - pnpm install --frozen-lockfile
          - pnpm --filter create-reactor-app build
          - echo "//registry.npmjs.org/:_authToken=$${NPM_TOKEN}" > ~/.npmrc
          - cd packages/create-app && npm publish --access public
        plugins:
          - docker#v5.12.0:
              image: "node:24"
        env:
          NPM_TOKEN: "${NPM_TOKEN}"
