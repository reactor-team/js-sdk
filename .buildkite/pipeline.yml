# Per-push CI: @reactor-team/js-sdk and create-reactor-app.

env: {}

definitions:
  - &node_docker
    plugins:
      - docker#v5.12.0:
          image: "node:20"
          propagate-environment: true
          environment:
            - "COREPACK_ENABLE_DOWNLOAD_PROMPT=0"

steps:
  - group: ":hammer: Build & Lint"
    steps:
      - <<: *node_docker
        label: ":package: Build"
        key: build
        commands:
          - corepack enable
          - pnpm install --frozen-lockfile
          - pnpm build
          - pnpm --filter create-reactor-app build

      - <<: *node_docker
        label: ":prettier: Format Check"
        commands:
          - corepack enable
          - pnpm install --frozen-lockfile
          - pnpm format:check

      - <<: *node_docker
        label: ":scales: License Check"
        commands:
          - ./scripts/check-license.sh

      - <<: *node_docker
        label: ":lock: Secret Scan"
        commands:
          - corepack enable
          - pnpm install --frozen-lockfile
          - pnpm lint:secrets

  - group: ":test_tube: Tests"
    steps:
      - <<: *node_docker
        label: ":white_check_mark: Unit Tests"
        key: unit-tests
        commands:
          - corepack enable
          - pnpm install --frozen-lockfile
          - pnpm test:unit

      # Gated to main-branch builds so the REACTOR_API_KEY secret is never
      # exposed to PR builds (including PRs from forks). PRs still run build,
      # lint, format, license, secret scan, and unit tests above — all of
      # which are secret-free and safe to run on untrusted code.
      - label: ":globe_with_meridians: Integration Tests"
        key: integration-tests
        if: build.branch == "main"
        commands:
          - corepack enable
          - pnpm install --frozen-lockfile
          - pnpm test:integration
        plugins:
          - docker#v5.12.0:
              image: "node:20"
              propagate-environment: true
              environment:
                - "COREPACK_ENABLE_DOWNLOAD_PROMPT=0"
                - "REACTOR_API_KEY"
        secrets:
          - REACTOR_API_KEY
